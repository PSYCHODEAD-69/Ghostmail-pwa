<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ghostmail</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#080810" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="https://i.ibb.co/ZpVSc1Jv/photo-2026-04-06-16-58-54.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── LOGIN SCREEN ─────────────────────────────── -->
  <div id="login-screen" class="screen active">
    <div class="login-bg">
      <div class="grid-lines"></div>
      <div class="glow-orb orb1"></div>
      <div class="glow-orb orb2"></div>
    </div>
    <div class="login-box">
      <div class="login-logo">
        <!-- LINE 1: Replace icon URL here -->
        <img src="https://i.ibb.co/ZpVSc1Jv/photo-2026-04-06-16-58-54.jpg" alt="Ghostmail" class="app-icon-large" />
        <h1>GHOSTMAIL</h1>
        <p class="login-sub">psychodead.qzz.io</p>
      </div>
      <div class="login-form">
        <div class="field-group">
          <label>USERNAME</label>
          <input type="text" id="login-username" autocomplete="username" placeholder="enter username" />
        </div>
        <div class="field-group">
          <label>PASSWORD</label>
          <input type="password" id="login-password" autocomplete="current-password" placeholder="enter password" />
        </div>
        <div id="login-error" class="error-msg hidden"></div>
        <button id="login-btn" class="btn-primary">
          <span class="btn-text">ACCESS</span>
          <span class="btn-loader hidden">◌</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ── MAIN APP ──────────────────────────────────── -->
  <div id="app-screen" class="screen hidden">

    <header class="app-header">
      <div class="header-logo">
        <!-- LINE 2: Replace icon URL here -->
        <img src="https://i.ibb.co/ZpVSc1Jv/photo-2026-04-06-16-58-54.jpg" alt="Ghostmail" class="app-icon-small" />
        <span class="header-title">GHOSTMAIL</span>
      </div>
      <button id="logout-btn" class="btn-logout" title="Logout">⏻</button>
    </header>

    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="compose">
        <span class="tab-icon">✉</span> COMPOSE
      </button>
      <button class="tab-btn" data-tab="history">
        <span class="tab-icon">◷</span> HISTORY
      </button>
    </nav>

    <!-- ── COMPOSE TAB ─────────────────────────────── -->
    <div id="tab-compose" class="tab-content active">
      <div class="compose-form">

        <div class="field-group">
          <label>FROM ALIAS</label>
          <div class="alias-input-wrap">
            <input type="text" id="from-alias" placeholder="unknown" autocomplete="off" />
            <span class="domain-suffix">@psychodead.qzz.io</span>
          </div>
          <div id="alias-suggestions" class="alias-dropdown hidden"></div>
        </div>

        <div class="field-group">
          <label>TO</label>
          <input type="email" id="to-address" placeholder="recipient@example.com" />
        </div>

        <div class="field-group">
          <label>SUBJECT</label>
          <input type="text" id="subject" placeholder="subject line" />
        </div>

        <div class="field-group">
          <label>BODY</label>
          <textarea id="body" placeholder="write your message here..."></textarea>
        </div>

        <div class="field-group">
          <label>ATTACHMENTS <span class="label-hint">(max 40MB each)</span></label>
          <div class="attachment-zone">
            <input type="file" id="file-input" multiple hidden />
            <button class="btn-attach" id="attach-btn">+ ADD FILES</button>
            <div id="file-list" class="file-list"></div>
          </div>
        </div>

        <div id="compose-error" class="error-msg hidden"></div>
        <div id="compose-success" class="success-msg hidden"></div>

        <div class="compose-actions">
          <button id="preview-btn" class="btn-secondary">PREVIEW</button>
          <button id="cancel-btn" class="btn-ghost">CANCEL</button>
          <button id="send-btn" class="btn-primary">
            <span class="btn-text">SEND ▶</span>
            <span class="btn-loader hidden">◌</span>
          </button>
        </div>

      </div>
    </div>

    <!-- ── HISTORY TAB ─────────────────────────────── -->
    <div id="tab-history" class="tab-content hidden">
      <div class="history-toolbar">
        <button id="refresh-history-btn" class="btn-ghost-sm">↻ REFRESH</button>
      </div>
      <div id="history-list" class="history-list">
        <div class="history-empty">No sent mails yet.</div>
      </div>
    </div>

  </div>

  <!-- ── PREVIEW MODAL ─────────────────────────────── -->
  <div id="preview-modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span>MAIL PREVIEW</span>
        <button id="close-preview" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="preview-row"><span class="preview-label">FROM</span><span id="prev-from"></span></div>
        <div class="preview-row"><span class="preview-label">TO</span><span id="prev-to"></span></div>
        <div class="preview-row"><span class="preview-label">SUBJECT</span><span id="prev-subject"></span></div>
        <div class="preview-divider"></div>
        <div id="prev-body" class="preview-body"></div>
        <div id="prev-attachments" class="preview-attachments"></div>
      </div>
      <div class="modal-footer">
        <button id="preview-send-btn" class="btn-primary">SEND ▶</button>
        <button id="preview-close-btn" class="btn-ghost">CLOSE</button>
      </div>
    </div>
  </div>

  <!-- ── MAIL DETAIL MODAL ──────────────────────────── -->
  <div id="detail-modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span>SENT MAIL</span>
        <button id="close-detail" class="modal-close">✕</button>
      </div>
      <div class="modal-body" id="detail-content"></div>
      <div class="modal-footer">
        <button id="delete-mail-btn" class="btn-danger">DELETE</button>
        <button id="detail-close-btn" class="btn-ghost">CLOSE</button>
      </div>
    </div>
  </div>

  <!-- Theme toggle -->
  <button id="theme-toggle" class="theme-btn" title="Toggle theme">◑</button>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
